# Scans every push and pull request for credentials, API keys, private keys,
# and other secrets using gitleaks. Fails the build on any new leak introduced
# by the diff. Historical leaks in this repo's git history are NOT scanned —
# only new commits — so existing known leaks (already-rotated, public) won't
# block CI. Adding a NEW secret to a commit will fail PR checks.
#
# How to add an exception (e.g., a test fixture that legitimately contains a
# fake-but-real-looking key): commit a `.gitleaksignore` file at repo root
# with the leak's Fingerprint (the first column gitleaks prints).
name: Secret scan

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so PR diffs against base commits work cleanly.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
