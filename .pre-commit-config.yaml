# Pre-commit hooks — run automatically on `git commit` to catch issues
# before they land in a commit. After adding/changing this file, run:
#   brew install pre-commit gitleaks  # one-time, per machine
#   pre-commit install                 # one-time, per clone of this repo
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # Scans staged changes for secrets (API keys, private keys, tokens).
        # If you genuinely need to commit a real-looking-but-fake value,
        # add its fingerprint to .gitleaksignore at repo root.
